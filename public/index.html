<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRai</title>
    <!-- 引入 Tailwind CSS 进行快速样式布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滚动条样式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .message-content pre {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .message-content code {
            font-family: monospace;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col md:py-6 md:px-4 items-center">

    <!-- 聊天主容器 -->
    <div class="w-full max-w-4xl bg-white h-full md:h-[90vh] md:rounded-2xl shadow-xl flex flex-col overflow-hidden relative">
        
        <!-- 头部 -->
        <header class="bg-blue-600 text-white p-4 flex items-center justify-between shadow-md z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 font-bold text-xl">G</div>
                <div>
                    <h1 class="font-bold text-lg">Gemini 智能助手</h1>
                    <p class="text-xs text-blue-100">基于 Google Gemini 驱动</p>
                </div>
            </div>
            <button onclick="clearChat()" class="text-sm bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-lg transition-colors">
                清空对话
            </button>
        </header>

        <!-- 聊天记录展示区 -->
        <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 bg-gray-50 pb-20">
            <!-- 欢迎消息 -->
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-white text-sm mt-1">AI</div>
                <div class="bg-white border border-gray-200 text-gray-800 p-3.5 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] leading-relaxed message-content">
                    你好！我是基于 Gemini API 的智能助手。请问有什么我可以帮你的？
                </div>
            </div>
        </main>

        <!-- 输入区 -->
        <footer class="bg-white border-t border-gray-200 p-3.5 flex gap-2 w-full absolute bottom-0 md:relative">
            <textarea 
                id="message-input" 
                rows="1"
                class="flex-1 resize-none bg-gray-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-xl px-4 py-3 outline-none transition-all duration-200"
                placeholder="输入你的问题... (Shift + Enter 换行)"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button 
                id="send-btn"
                onclick="sendMessage()" 
                class="bg-blue-600 text-white rounded-xl px-5 font-medium hover:bg-blue-700 transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <span>发送</span>
            </button>
        </footer>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        
        // 用于保存对话上下文历史
        let chatHistory = [];

        // 自动调整输入框高度
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            let newHeight = this.scrollHeight;
            this.style.height = (newHeight < 150 ? newHeight : 150) + 'px';
        });

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 1. 添加用户消息到 UI
            appendMessage('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            messageInput.focus();

            // 禁用发送按钮，显示加载状态
            sendBtn.disabled = true;
            sendBtn.innerHTML = `<span class="animate-pulse">思考中...</span>`;

            try {
                // 2. 发送请求到 Node.js 后端
                // 注意：使用相对路径 '/api/chat'，它会自动请求当前域名下的后端接口
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        history: chatHistory
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // 3. 将后端返回的 AI 回复添加到 UI
                    appendMessage('ai', data.text);
                    
                    // 4. 更新前端的对话历史（保存到数组中供下一轮对话使用）
                    chatHistory.push({ role: 'user', parts: [{ text: message }] });
                    chatHistory.push({ role: 'model', parts: [{ text: data.text }] });
                } else {
                    appendMessage('error', data.error || '请求失败，请检查网络或后端日志。');
                }
            } catch (error) {
                appendMessage('error', '无法连接到服务器，请确保后端服务正在运行。');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<span>发送</span>`;
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `flex gap-4 ${sender === 'user' ? 'flex-row-reverse' : ''} animate-fade-in`;
            
            // 简单处理一下 markdown 换行，实际生产中推荐引入 marked.js
            const formattedText = text.replace(/\n/g, '<br/>');

            if (sender === 'user') {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex-shrink-0 flex items-center justify-center text-indigo-700 text-sm mt-1">我</div>
                    <div class="bg-blue-600 text-white p-3.5 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] leading-relaxed">
                        ${formattedText}
                    </div>
                `;
            } else if (sender === 'ai') {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-white text-sm mt-1">AI</div>
                    <div class="bg-white border border-gray-200 text-gray-800 p-3.5 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] leading-relaxed message-content">
                        ${formattedText}
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-red-500 flex-shrink-0 flex items-center justify-center text-white text-sm mt-1">!</div>
                    <div class="bg-red-50 text-red-600 border border-red-200 p-3.5 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-sm">
                        ${text}
                    </div>
                `;
            }

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearChat() {
            chatHistory = [];
            chatContainer.innerHTML = `
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-white text-sm mt-1">AI</div>
                    <div class="bg-white border border-gray-200 text-gray-800 p-3.5 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] leading-relaxed message-content">
                        上下文已清空。有什么新问题吗？
                    </div>
                </div>
            `;
        }
    </script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
